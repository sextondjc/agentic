name: Governance Cadence

on:
  workflow_dispatch:
  schedule:
    # Run monthly on the first day at 09:00 UTC.
    - cron: '0 9 1 * *'

permissions:
  contents: read

concurrency:
  group: governance-cadence
  cancel-in-progress: false

jobs:
  governance-checks:
    name: Governance Checks
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run governance script checks
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          ./.github/scripts/powershell/invoke-governance-health-overview.ps1 -RootPath . -ReviewDate (Get-Date -Format 'yyyy-MM-dd')

      - name: Upload governance report artifacts
        uses: actions/upload-artifact@v4
        with:
          name: governance-report
          path: ./.github/skills/governance-health-overview/references/.artifacts/*
