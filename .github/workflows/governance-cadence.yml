name: Governance Cadence

on:
  workflow_dispatch:
  schedule:
    # Run monthly on the first day at 09:00 UTC.
    - cron: '0 9 1 * *'

permissions:
  contents: read

concurrency:
  group: governance-cadence
  cancel-in-progress: false

jobs:
  governance-checks:
    name: Governance Checks
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run governance script checks
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Path ./.github/skills/governance-health-overview/references/.artifacts -Force | Out-Null

          Push-Location $env:GITHUB_WORKSPACE
          try {
            # Frontmatter validation (semantic — exits 1 on empty values or unknown keys)
            ./.github/scripts/powershell/test-frontmatter-validity.ps1 -AssetType instructions
            ./.github/scripts/powershell/test-frontmatter-validity.ps1 -AssetType agents
            ./.github/scripts/powershell/test-frontmatter-validity.ps1 -AssetType prompts

            # Catalog integrity (exits 1 on missing or stale entries)
            ./.github/scripts/powershell/test-catalog-integrity.ps1 -AssetType agents
            ./.github/scripts/powershell/test-catalog-integrity.ps1 -AssetType skills
            ./.github/scripts/powershell/test-catalog-integrity.ps1 -AssetType instructions
            ./.github/scripts/powershell/test-catalog-integrity.ps1 -AssetType prompts

            # Hub file sync (exits 1 on divergence — invoked directly, not piped, so exit code surfaces)
            ./.github/scripts/powershell/test-hub-file-sync.ps1

            # Governance optimization factor (exits 1 if optimization review factor coverage drifts)
            ./.github/scripts/powershell/test-governance-optimization-factor.ps1

            # Governance link graph (exits 1 on broken links)
            ./.github/scripts/powershell/test-governance-link-graph.ps1

            # Governance artifact path contracts (exits 1 on legacy path violations)
            ./.github/scripts/powershell/test-governance-artifact-contract.ps1

            # Artifact reference hygiene (exits 1 on stale unreferenced governance artifacts)
            ./.github/scripts/powershell/test-artifact-reference-hygiene.ps1 -ArtifactsPath ./.github/skills/governance-health-overview/references/.artifacts | Tee-Object -FilePath ./.github/skills/governance-health-overview/references/.artifacts/artifact-reference-hygiene.txt

            # .docs naming conformance
            ./.github/scripts/powershell/test-naming-conformance.ps1 -RootPath .docs

            # Index refresh companion check (librarian hygiene)
            ./.github/scripts/powershell/invoke-index-refresh.ps1 -RootPath .docs | Tee-Object -FilePath ./.github/skills/governance-health-overview/references/.artifacts/index-refresh.txt

            # .github asset naming conformance
            ./.github/scripts/powershell/test-asset-naming.ps1 -AssetType all

            # Skill utilization coverage (GOV-S9)
            ./.github/scripts/powershell/test-utilization-coverage.ps1 | Tee-Object -FilePath ./.github/skills/governance-health-overview/references/.artifacts/utilization-coverage.txt

            # Review recency threshold (GOV-S10)
            ./.github/scripts/powershell/test-review-recency.ps1 -ThresholdDays 90 | Tee-Object -FilePath ./.github/skills/governance-health-overview/references/.artifacts/review-recency.txt

            # Source catalog freshness threshold
            ./.github/scripts/powershell/test-source-catalog-freshness.ps1 -ThresholdDays 30 | Tee-Object -FilePath ./.github/skills/governance-health-overview/references/.artifacts/source-catalog-freshness.txt

            # Responsibility overlap threshold across agents/instructions/prompts/skills
            ./.github/scripts/powershell/test-responsibility-overlap.ps1 -SimilarityThreshold 0.82 -MinimumSharedTokens 6 -MaxAllowedDuplicatePairs 8 -OutputPath ./.github/skills/governance-health-overview/references/.artifacts/responsibility-overlap.routing.json | Tee-Object -FilePath ./.github/skills/governance-health-overview/references/.artifacts/responsibility-overlap.txt

            # Overlap watchlist monitoring for known high-similarity pair
            ./.github/scripts/powershell/test-overlap-watchlist.ps1 | Tee-Object -FilePath ./.github/skills/governance-health-overview/references/.artifacts/overlap-watchlist.txt

            # Count normalization and consistency check across generated artifacts
            ./.github/scripts/powershell/test-governance-count-consistency.ps1 | Tee-Object -FilePath ./.github/skills/governance-health-overview/references/.artifacts/count-consistency.txt

            # Preserve explicit rationale for intentional global applyTo scope
            ./.github/scripts/powershell/test-global-applyto-rationale.ps1 | Tee-Object -FilePath ./.github/skills/governance-health-overview/references/.artifacts/global-applyto-rationale.txt

            # Deterministic routing coverage and required-skill recall
            ./.github/scripts/powershell/test-routing-determinism.ps1 | Tee-Object -FilePath ./.github/skills/governance-health-overview/references/.artifacts/routing-determinism.txt
          }
          finally {
            Pop-Location
          }

      - name: Upload governance report artifacts
        uses: actions/upload-artifact@v4
        with:
          name: governance-report
          path: ./.github/skills/governance-health-overview/references/.artifacts/*
