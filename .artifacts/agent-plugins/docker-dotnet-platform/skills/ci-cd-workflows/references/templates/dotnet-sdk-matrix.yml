# Template: .NET SDK setup with multi-version matrix strategy
# Use when: CI must validate against multiple .NET SDK versions (e.g. LTS + current).
# Pin dotnet-version values to the SDKs your project supports; update on new LTS releases.

name: dotnet-ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dotnet-version: ['8.x', '9.x']
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET ${{ matrix.dotnet-version }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}
      - name: Display SDK version
        run: dotnet --version
