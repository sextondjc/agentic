# Template: Canonical .NET build and test sequence
# Use when: Implementing the standard restore → build → test quality gate.
# --no-restore and --no-build prevent redundant operations across steps.
# --logger trx writes test results in TRX format for artifact upload.

steps:
  - uses: actions/checkout@v4
  - uses: actions/setup-dotnet@v4
    with:
      dotnet-version: '8.x'
      cache: true
      cache-dependency-path: '**/packages.lock.json'
  - name: Restore
    run: dotnet restore
  - name: Build
    run: dotnet build --no-restore --configuration Release
  - name: Test
    run: >
      dotnet test
      --no-build
      --configuration Release
      --logger trx
      --results-directory TestResults
